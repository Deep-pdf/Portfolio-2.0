<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="google-fonts.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            padding: 0;
            margin: 0;
            min-width: 1024px;
            min-height: 600px;
        }

        .main {
            height: 100%;
            width: 100%;
            flex: 1;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .bar {
            height: 10vh;
            width: 100%;
            background: #002c6a;
            z-index: 10;
            position: fixed;
            left: 0;
            right: 0;
        }

        .top {
            top: 0;
        }

        .bottom {
            bottom: 0;
        }

        .workarea {
            height: calc(100vh - 20vh);
            width: 100%;
            background:
                radial-gradient(circle at 15% 30%, rgba(255, 255, 255, 0.15), transparent 40%),
                radial-gradient(circle at 85% 70%, rgba(255, 255, 255, 0.12), transparent 45%),
                linear-gradient(135deg, #0063a5 0%, #0b74ba 100%);
            z-index: 1;
            position: fixed;
            top: 10vh;
            bottom: 10vh;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .Mline {
            width: 0.15vw;
            height: clamp(350px, 47vh, 570px);
            background: linear-gradient(to bottom,
                    transparent 0%,
                    white 40%,
                    white 60%,
                    transparent 100%);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .Tline {
            width: clamp(400px, 65vw, 750px);
            height: 1.2vh;
            background: white;
            -webkit-mask-image: radial-gradient(ellipse 60% 100% at center,
                    black 40%,
                    transparent 81%);
            mask-image: radial-gradient(ellipse 60% 100% at center,
                    black 40%,
                    transparent 81%);
            position: absolute;
            top: 0%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .Bline {
            width: clamp(400px, 65vw, 750px);
            height: 1.2vh;
            background: #EBAD00;
            -webkit-mask-image: radial-gradient(ellipse 60% 100% at center,
                    black 40%,
                    transparent 81%);
            mask-image: radial-gradient(ellipse 60% 100% at center,
                    black 40%,
                    transparent 81%);
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .left-block {
            width: 50%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .right-block {
            width: 50%;
            height: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            position: relative;
        }

        .logo-wrap {
            width: clamp(180px, 300px, 38%);
            height: 180px;
            font-size: clamp(10px, 22px, 1vw);
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            position: absolute;
            right: 10%;
            top: 23%;
            /* background: rgba(255, 255, 255, 0.1); */
        }

        .logo {
            width: 7em;
            object-fit: contain;
            position: absolute;
            left: 7.3em;
            top: 0em;
        }

        .microsoft {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.6em;
            color: white;
            position: absolute;
            top: 2.2em;
            left: 0%;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
        }

        .Windows {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 3.5em;
            font-weight: 620;
            color: white;
            position: absolute;
            top: 1.35em;
            left: 0%;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
        }

        .xp {
            font-family: 'CreatoDisplay-I';
            font-size: 2.2em;
            font-weight: 720;
            color: #ff8800;
            position: absolute;
            top: 2.2em;
            left: 6.8em;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
        }

        .professional {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 2.2em;
            color: white;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
            position: absolute;
            top: 3.8em;
            left: 0.2em;
        }

        .begin-text {
            font-family: 'CreatoDisplay-L';
            color: white;
            position: absolute;
            top: 60%;
            right: 17%;
            text-shadow: 1px 2px 10px rgba(0, 0, 0, 0.35);
            font-size: clamp(1.2em, 2.5vw, 2vw);
        }

        .box-container {
            width: 70%;
            height: 80%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 40px;
            padding: 0;
            /* background: rgba(0, 0, 0, 1); */
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .boxx {
            width: 100%;
            height: 20%;
            background: linear-gradient(135deg, #003C96 0%, #0063a5 100%);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 1);
            /* fade out to the right */
            mask-image: linear-gradient(to right, black 10%, transparent 80%);
            -webkit-mask-image: linear-gradient(to right, black 10%, transparent 80%);
        }


            /* Responsive design for smaller screens */
            @media (max-width: 1600px) {

                .left-block,
                .right-block {
                    width: 50%;
                }
            }

            @media (max-width: 1024px) {
                body {
                    min-width: auto;
                }

                .workarea {
                    height: calc(100vh - 20vh);
                    bottom: 10vh;
                }

                .left-block,
                .right-block {
                    width: 100%;
                    height: 100%;
                    padding: 0;
                }


            }

            @media (max-width: 768px) {
                body {
                    min-width: auto;
                }

                .workarea {
                    height: calc(100vh - 20vh);
                    bottom: 10vh;
                    flex-direction: column;
                }

                .left-block,
                .right-block {
                    width: 100%;
                    height: 100%;
                    padding: 0;
                }

                .Mline {
                    width: 80vw;
                    height: 1vw;
                    background: linear-gradient(to right,
                            transparent 0%,
                            white 40%,
                            white 60%,
                            transparent 100%);
                }

                .logo-wrap {
                    left: 55%;
                    transform: translateX(-50%);
                }

                .begin-text {
                    top: 65%;
                    right: 50%;
                    transform: translateX(50%);
                    width: 240px;
                }

            }
    </style>

</head>

<body>
    <div class="main">
        <div class="top bar"></div>
        <div class="workarea">
            <div class="Tline"></div>
            <div class="Mline"></div>
            <div class="Bline"></div>

            <div class="left-block">
                <div class="logo-wrap">
                    <img src="Assets/MS logo.png" alt="" class="logo" />
                    <p class="text microsoft">Microsoft</p>
                    <p class="text Windows">Windows</p>
                    <p class="text xp">xp</p>
                    <p class="text professional">Professional</p>
                </div>
                <div class="begin-text">
                    <p>To begin, click the user name</p>
                </div>
            </div>

            <div class="right-block">
                <div class="box-container">
                    <div class="box1 boxx"></div>
                    <div class="box2 boxx"></div>
                </div>
            </div>

        </div>
        <div class="bottom bar"></div>
    </div>
</body>

</html>
